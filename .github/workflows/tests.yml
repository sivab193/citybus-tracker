name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Dockerized Tests
      run: |
        # Create a dummy .env if it doesn't exist to avoid compose errors
        touch .env
        make test-docker
