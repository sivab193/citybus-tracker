name: Deploy to GCE

on:
  push:
    branches: [main]

jobs:
  check-pr:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check for /prod command
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          SHOULD_DEPLOY="false"

          if [ "$ACTOR" = "${{ github.repository_owner }}" ] && echo "$COMMIT_MSG" | grep -q "/prod"; then
            SHOULD_DEPLOY="true"
          else
            PRS_JSON=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls 2>/dev/null || echo "[]")
            PR_NUM=$(echo "$PRS_JSON" | jq -r '.[0].number // empty')

            if [ -n "$PR_NUM" ]; then
              PR_BODY=$(echo "$PRS_JSON" | jq -r '.[0].body // empty')
              PR_AUTHOR=$(echo "$PRS_JSON" | jq -r '.[0].user.login // empty')

              if [ "$PR_AUTHOR" = "${{ github.repository_owner }}" ] && echo "$PR_BODY" | grep -q "/prod"; then
                SHOULD_DEPLOY="true"
              else
                PROD_COMMENTS=$(gh api repos/${{ github.repository }}/issues/$PR_NUM/comments --jq ".[] | select(.user.login == \"${{ github.repository_owner }}\") | .body" 2>/dev/null || echo "")
                if echo "$PROD_COMMENTS" | grep -q "/prod"; then
                  SHOULD_DEPLOY="true"
                fi
              fi
            fi
          fi

          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"
          echo "Determined should_deploy=$SHOULD_DEPLOY"

  deploy:
    runs-on: ubuntu-latest
    needs: check-pr
    if: needs.check-pr.outputs.should_deploy == 'true'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/citybus-tracker
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            docker image prune -f
            echo "✅ Deploy complete at $(date)"
