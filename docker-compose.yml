services:
  redis:
    image: redis:alpine
    container_name: citybus-redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    image: citybus:latest
    container_name: citybus-api
    command: uvicorn main_api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TZ=America/Indiana/Indianapolis
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  bot:
    image: citybus:latest
    container_name: citybus-bot
    command: python main_bot.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TZ=America/Indiana/Indianapolis
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  worker:
    image: citybus:latest
    container_name: citybus-worker
    command: python main_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TZ=America/Indiana/Indianapolis
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  mcp:
    image: citybus:latest
    container_name: citybus-mcp
    command: python -m citybus.mcp.server --sse
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TZ=America/Indiana/Indianapolis
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
